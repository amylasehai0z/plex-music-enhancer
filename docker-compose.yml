services:
  plex-music-enhancer:
    image: ghcr.io/amylasehai0z/plex-music-enhancer:latest
    build:
      context: .
      args:
        VERSION: ${PLEX_ENHANCER_IMAGE_VERSION:-local}
        REVISION: ${PLEX_ENHANCER_IMAGE_REVISION:-local}
        CREATED: ${PLEX_ENHANCER_IMAGE_CREATED:-local}
    container_name: plex-music-enhancer
    restart: unless-stopped
    ports:
      - "${PLEX_ENHANCER_HOST_PORT:-1008}:8080"
    environment:
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      PLEX_ENHANCER_PLEX_URL: ${PLEX_ENHANCER_PLEX_URL:-}
      PLEX_ENHANCER_PLEX_TOKEN: ${PLEX_ENHANCER_PLEX_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PLEX_ENHANCER_CONFIG: ${PLEX_ENHANCER_CONFIG:-/config}
      PLEX_ENHANCER_CACHE: ${PLEX_ENHANCER_CACHE:-/cache}
      PLEX_ENHANCER_LOG_LEVEL: ${PLEX_ENHANCER_LOG_LEVEL:-INFO}
      PLEX_ENHANCER_WEB__PORT: 8080
    labels:
      org.opencontainers.image.title: Plex Music Enhancer
      org.opencontainers.image.source: https://github.com/amylasehai0z/plex-music-enhancer
      io.portainer.accesscontrol.public: "false"
    volumes:
      - ./docker/config:/config
      - ./docker/cache:/cache
      - ./docker/logs:/logs
      - ./docker/music:/music:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/api/v1/system/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
