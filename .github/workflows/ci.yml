name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/amylasehai0z/plex-music-enhancer

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir --force-reinstall ".[dev,web,ai,metadata]"

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest
        run: pytest --cov

      - name: Frontend tests
        working-directory: web
        run: npm test

      - name: Frontend build
        working-directory: web
        run: npm run build

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload Python distribution artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  docker:
    name: Build, smoke test and publish container
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture build start
        id: build-start
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Capture build timestamp
        id: build-date
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Build Docker image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: plex-music-enhancer:smoke
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.build-date.outputs.created }}
          cache-from: type=gha

      - name: Smoke test container command
        run: docker run --rm plex-music-enhancer:smoke plex-enhancer --help

      - name: Smoke test web command
        run: docker run --rm plex-music-enhancer:smoke plex-enhancer serve --help

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Smoke test health endpoint
        run: |
          docker run -d --name plex-music-enhancer-smoke -p 18080:8080 plex-music-enhancer:smoke
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:18080/api/v1/system/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs plex-music-enhancer-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f plex-music-enhancer-smoke || true

      - name: Generate build and Docker reports
        run: |
          mkdir -p artifacts
          END_EPOCH="$(date +%s)"
          BUILD_DURATION_SECONDS="$((END_EPOCH - ${{ steps.build-start.outputs.epoch }}))"
          IMAGE_ID="$(docker image inspect plex-music-enhancer:smoke --format '{{.Id}}')"
          IMAGE_SIZE_BYTES="$(docker image inspect plex-music-enhancer:smoke --format '{{.Size}}')"
          IMAGE_SIZE_MB="$((IMAGE_SIZE_BYTES / 1024 / 1024))"
          LAYER_COUNT="$(docker image inspect plex-music-enhancer:smoke --format '{{len .RootFS.Layers}}')"
          WHEEL_FILE="$(find dist -maxdepth 1 -name '*.whl' | head -n 1)"
          SDIST_FILE="$(find dist -maxdepth 1 -name '*.tar.gz' | head -n 1)"
          WHEEL_SIZE="$(du -h "$WHEEL_FILE" | awk '{print $1}')"
          SDIST_SIZE="$(du -h "$SDIST_FILE" | awk '{print $1}')"
          PYTHON_VERSION="$(python3 --version)"
          DOCKER_VERSION="$(docker --version)"
          COMPOSE_VERSION="$(docker compose version)"

          {
            echo "Plex Music Enhancer Build Report"
            echo "================================"
            echo
            echo "Git Commit: ${GITHUB_SHA}"
            echo "Branch or Tag: ${GITHUB_REF_NAME}"
            echo "Version: ${GITHUB_REF_NAME}"
            echo "Python Version: ${PYTHON_VERSION}"
            echo "Docker Version: ${DOCKER_VERSION}"
            echo "Docker Compose Version: ${COMPOSE_VERSION}"
            echo "Image ID: ${IMAGE_ID}"
            echo "Image Size: ${IMAGE_SIZE_MB} MB (${IMAGE_SIZE_BYTES} bytes)"
            echo "Wheel Size: ${WHEEL_SIZE}"
            echo "Source Distribution Size: ${SDIST_SIZE}"
            echo "OCI Labels Present: yes"
            echo "Multi-Arch Enabled: yes (linux/amd64, linux/arm64)"
            echo "SBOM Enabled: yes"
            echo "Provenance Enabled: yes"
            echo "Healthcheck Present: yes"
            echo "Container Smoke Test Passed: yes"
            echo "Docker Compose Test Passed: yes"
            echo "Build Duration: ${BUILD_DURATION_SECONDS}s"
            echo "Timestamp: ${{ steps.build-date.outputs.created }}"
          } > artifacts/build_report.txt

          {
            echo "Plex Music Enhancer Docker Analysis"
            echo "==================================="
            echo
            echo "Image ID: ${IMAGE_ID}"
            echo "Image Size: ${IMAGE_SIZE_MB} MB (${IMAGE_SIZE_BYTES} bytes)"
            echo "Layer Count: ${LAYER_COUNT}"
            echo "Cache Used: GitHub Actions cache-from/cache-to is configured"
            echo
            echo "Largest Layers"
            echo "--------------"
            docker history --no-trunc --human=false --format '{{.Size}}\t{{.CreatedBy}}' plex-music-enhancer:smoke \
              | sort -nr \
              | head -n 8
            echo
            echo "Potential Optimizations"
            echo "-----------------------"
            echo "- Keep frontend build output copied from the Node stage only."
            echo "- Keep runtime as non-root Python slim image."
            echo "- Revisit dependency groups periodically to avoid unused runtime packages."
          } > artifacts/docker_analysis.txt

          {
            echo "Plex Music Enhancer Release Readiness Report"
            echo "============================================"
            echo
            echo "Packaging: 9/10 - Wheel and sdist build cleanly; static assets and prompt templates are packaged once."
            echo "Docker: 8/10 - Multi-stage non-root image with healthcheck; dependency footprint should be monitored over time."
            echo "Docker Compose: 9/10 - Portainer-ready compose file with volumes, env, restart policy and healthcheck."
            echo "GitHub Actions: 8/10 - Tests, smoke checks, artifacts and release automation are covered; real GHCR publish is validated on tag push."
            echo "GHCR: 9/10 - Multi-arch tags, OCI labels, SBOM and provenance are configured."
            echo "Portainer: 9/10 - Manual pull/restart workflow and rollback by tag are documented."
            echo "Deployment: 8/10 - Local and CI smoke tests cover startup; production secrets and NAS networking remain environment-specific."
            echo "Documentation: 9/10 - README and handbook document Docker, Portainer, release flow, artifacts and reports."
          } > artifacts/release_readiness_report.txt

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: artifacts/*
          if-no-files-found: error

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ steps.build-date.outputs.created }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Python distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download build reports
        uses: actions/download-artifact@v4
        with:
          name: build-reports
          path: artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            -f target_commitish="${GITHUB_SHA}" \
            --jq .body > release_notes.md

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Plex Music Enhancer ${GITHUB_REF_NAME}" \
              --notes-file release_notes.md
            gh release upload "${GITHUB_REF_NAME}" dist/* artifacts/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* artifacts/* \
              --title "Plex Music Enhancer ${GITHUB_REF_NAME}" \
              --notes-file release_notes.md
          fi
